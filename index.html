<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2c3e6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N1學習">
<meta name="description" content="Rong 的 JLPT N1 學習教材庫">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>JLPT N1 學習教材｜Rong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --navy: #2c3e6b;
    --blue: #4a7fd4;
    --light-blue: #e8f0fe;
    --green: #4caf7d;
    --red: #e85d5d;
    --yellow: #f5a623;
    --bg: #f7f5f0;
    --card: #fff;
    --text: #2c2c2c;
    --muted: #888;
    --border: #e8e4dc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Header ── */
  .hero {
    background: linear-gradient(150deg, #1a2a50 0%, #2c3e6b 50%, #4a7fd4 100%);
    color: white;
    padding: 3rem 1.5rem 2rem;
    padding-top: calc(3rem + env(safe-area-inset-top));
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 220px; height: 220px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 0.3rem 1rem;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin-bottom: 1rem;
  }
  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
  }
  .hero-sub { font-size: 0.88rem; opacity: 0.7; }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 0;
    margin: 0 1.2rem;
    transform: translateY(-1.2rem);
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .stat {
    flex: 1;
    text-align: center;
    padding: 1.1rem 0.5rem;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--navy);
    display: block;
    line-height: 1;
  }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }

  /* ── Install Banner ── */
  .install-banner {
    display: none;
    margin: 0 1.2rem 1.2rem;
    background: linear-gradient(90deg, #4a7fd4, #6c9ce8);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    color: white;
    align-items: center;
    gap: 0.8rem;
  }
  .install-banner.show { display: flex; }
  .install-banner-text { flex: 1; font-size: 0.85rem; }
  .install-banner-text strong { display: block; font-size: 0.92rem; }
  .install-btn {
    background: white;
    color: var(--blue);
    border: none;
    border-radius: 8px;
    padding: 0.45rem 1rem;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .dismiss-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0 0.2rem;
  }

  /* ── Section ── */
  .section { padding: 0 1.2rem 2rem; }
  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  /* ── Lesson Cards ── */
  .lesson-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .lesson-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .lesson-card:active { transform: scale(0.98); }

  .lesson-date-bar {
    width: 5px;
    background: linear-gradient(180deg, #4a7fd4, #2c3e6b);
    flex-shrink: 0;
  }
  .lesson-content { padding: 1rem 1.1rem; flex: 1; }
  .lesson-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.3rem;
  }
  .lesson-date { font-size: 0.75rem; color: var(--muted); }
  .lesson-tags { display: flex; gap: 0.3rem; }
  .tag {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 50px;
  }
  .tag-vocab { background: #fff3e0; color: #e65100; }
  .tag-grammar { background: var(--light-blue); color: var(--blue); }
  .lesson-title {
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 0.2rem;
  }
  .lesson-subtitle { font-size: 0.8rem; color: var(--muted); }

  .lesson-arrow {
    display: flex;
    align-items: center;
    padding: 0 1rem;
    color: var(--muted);
    font-size: 1.1rem;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
    font-size: 0.9rem;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* ── Goal progress ── */
  .goal-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 1.2rem 1.4rem;
    margin-bottom: 1.2rem;
  }
  .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
  .goal-title { font-size: 0.9rem; font-weight: 700; }
  .goal-pct { font-size: 1.1rem; font-weight: 700; color: var(--blue); }
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a7fd4, #6c9ce8);
    border-radius: 50px;
    transition: width 0.8s ease;
  }
  .goal-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; }

  /* ── Footer ── */
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 1.5rem 1rem 2rem;
    border-top: 1px solid var(--border);
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">JLPT N1</div>
  <h1>日本語 N1</h1>
  <div class="hero-sub">Rong の学習ノート｜目標：年内合格 🎯</div>
</div>

<div class="stats" id="stats">
  <div class="stat">
    <span class="stat-num" id="stat-total">—</span>
    <div class="stat-label">學習天數</div>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-this-month">—</span>
    <div class="stat-label">本月</div>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-streak">—</span>
    <div class="stat-label">連續天數</div>
  </div>
</div>

<!-- PWA Install Banner -->
<div class="install-banner" id="install-banner">
  <span style="font-size:1.4rem">📲</span>
  <div class="install-banner-text">
    <strong>加到主畫面</strong>
    像 App 一樣快速開啟
  </div>
  <button class="install-btn" id="install-btn">安裝</button>
  <button class="dismiss-btn" id="dismiss-btn">✕</button>
</div>

<div class="section">
  <div class="goal-card">
    <div class="goal-header">
      <span class="goal-title">🎯 N1 目標進度</span>
      <span class="goal-pct" id="goal-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="goal-sub" id="goal-sub">計算中…</div>
  </div>

  <div class="section-title">學習記錄</div>
  <div class="lesson-list" id="lesson-list">
    <div class="loading">載入中…</div>
  </div>
</div>

<footer>
  JLPT N1 學習教材 by Rong × Claude<br>
  <span id="last-updated"></span>
</footer>

<script>
// ── PWA Install ──────────────────────────────────────────────
let deferredPrompt;
const installBanner = document.getElementById('install-banner');
const installBtn    = document.getElementById('install-btn');
const dismissBtn    = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('pwa-dismissed')) {
    installBanner.classList.add('show');
  }
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') installBanner.classList.remove('show');
  deferredPrompt = null;
});

dismissBtn.addEventListener('click', () => {
  installBanner.classList.remove('show');
  localStorage.setItem('pwa-dismissed', '1');
});

// ── Service Worker ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Load Lessons ─────────────────────────────────────────────
async function loadLessons() {
  let lessons = [];
  try {
    const res = await fetch('lessons.json?t=' + Date.now());
    lessons = await res.json();
  } catch(e) {
    document.getElementById('lesson-list').innerHTML =
      '<div class="empty"><div class="icon">📚</div>還沒有教材，快去學習吧！</div>';
    return;
  }

  // Sort newest first
  lessons.sort((a, b) => b.date.localeCompare(a.date));

  // Stats
  document.getElementById('stat-total').textContent = lessons.length;
  const thisMonth = new Date().toISOString().slice(0,7);
  const monthCount = lessons.filter(l => l.date.startsWith(thisMonth)).length;
  document.getElementById('stat-this-month').textContent = monthCount;

  // Streak calc
  const dates = lessons.map(l => l.date).sort();
  let streak = 0, today = new Date().toISOString().slice(0,10);
  for (let i = dates.length - 1; i >= 0; i--) {
    const diff = (new Date(today) - new Date(dates[i])) / 86400000;
    if (diff <= streak + 1) streak++;
    else break;
  }
  document.getElementById('stat-streak').textContent = streak;

  // Goal: assume ~240 study days from Apr 2026 to Dec 2026
  const start = new Date('2026-04-01'), end = new Date('2026-12-01');
  const total = Math.round((end - start) / 86400000);
  const done  = lessons.length;
  const pct   = Math.min(100, Math.round(done / total * 100));
  document.getElementById('goal-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  const daysLeft = Math.max(0, Math.round((end - new Date()) / 86400000));
  document.getElementById('goal-sub').textContent =
    `已學 ${done} 天，距考試還有約 ${daysLeft} 天，加油！`;

  // Render cards
  const list = document.getElementById('lesson-list');
  if (!lessons.length) {
    list.innerHTML = '<div class="empty"><div class="icon">📚</div>還沒有教材，快去學習吧！</div>';
    return;
  }

  list.innerHTML = '';

  // Group by month
  const byMonth = {};
  lessons.forEach(l => {
    const m = l.date.slice(0,7);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(l);
  });

  Object.keys(byMonth).sort().reverse().forEach(month => {
    const label = document.createElement('div');
    label.className = 'section-title';
    label.style.marginTop = '1rem';
    const [y, m] = month.split('-');
    label.textContent = `${y}年${parseInt(m)}月`;
    list.appendChild(label);

    byMonth[month].forEach(lesson => {
      const a = document.createElement('a');
      a.className = 'lesson-card';
      a.href = lesson.file;

      const dayStr = lesson.date.slice(8);
      const weekdays = ['日','一','二','三','四','五','六'];
      const wd = weekdays[new Date(lesson.date).getDay()];
      const tags = (lesson.tags || []).map(t => {
        const cls = t === '語彙' ? 'tag-vocab' : 'tag-grammar';
        return `<span class="tag ${cls}">${t}</span>`;
      }).join('');

      a.innerHTML = `
        <div class="lesson-date-bar"></div>
        <div class="lesson-content">
          <div class="lesson-meta">
            <span class="lesson-date">${parseInt(dayStr)}日（${wd}）</span>
            <div class="lesson-tags">${tags}</div>
          </div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-subtitle">${lesson.subtitle || ''}</div>
        </div>
        <div class="lesson-arrow">›</div>
      `;
      list.appendChild(a);
    });
  });

  // Last updated
  if (lessons.length) {
    document.getElementById('last-updated').textContent =
      '最後更新：' + lessons[0].date;
  }
}

loadLessons();
</script>
</body>
</html>
